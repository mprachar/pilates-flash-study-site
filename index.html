<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilates Study Flash Cards</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
</head>
<body>
  <div class="container">

    <!-- HOME SCREEN -->
    <div id="homeScreen" class="screen">
      <header class="app-header">
        <h1>Pilates Study Cards</h1>
        <p class="subtitle">Certification Exam Prep</p>
      </header>

      <div class="format-toggle">
        <button id="btnFormatQuiz" class="format-btn active">Quiz</button>
        <button id="btnFormatFlash" class="format-btn">Flash Cards</button>
      </div>

      <div class="mode-toggle">
        <button id="btnStudyNew" class="mode-btn active">New Questions</button>
        <button id="btnStudyAll" class="mode-btn">All Questions</button>
        <button id="btnStudyMissed" class="mode-btn">Missed Only</button>
      </div>

      <div id="sectionList" class="section-list"></div>

      <div class="home-actions">
        <button id="btnStartQuiz" class="btn btn-primary" disabled>Select sections to start</button>
        <button id="btnSelectAll" class="btn btn-outline">Select All</button>
        <button id="btnResetProgress" class="btn btn-danger-text">Reset Progress</button>
      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quizScreen" class="screen hidden">
      <div class="quiz-header">
        <button id="btnBack" class="btn-icon" aria-label="Back">&larr;</button>
        <span id="quizProgress" class="quiz-progress-text"></span>
        <span id="quizSection" class="quiz-section-label"></span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <div class="quiz-card">
        <div id="questionImage" class="question-image" style="display:none;">
          <img src="" alt="Question diagram" id="questionImg" loading="lazy">
        </div>
        <p id="questionText" class="question-text"></p>
        <div id="answersContainer" class="answers-container"></div>
        <div id="explanation" class="explanation hidden"></div>
      </div>

      <button id="btnNext" class="btn btn-primary hidden">Next Question</button>
    </div>

    <!-- FLASHCARD SCREEN -->
    <div id="flashScreen" class="screen hidden">
      <div class="quiz-header">
        <button id="flashBtnBack" class="btn-icon" aria-label="Back">&larr;</button>
        <span id="flashProgress" class="quiz-progress-text"></span>
        <span id="flashSection" class="quiz-section-label"></span>
      </div>
      <div class="progress-bar">
        <div id="flashProgressFill" class="progress-fill"></div>
      </div>

      <div id="flashCard" class="flash-card" role="button" tabindex="0" aria-label="Tap to flip card">
        <div class="flash-card-inner">
          <div class="flash-card-front">
            <div id="flashImage" class="question-image" style="display:none;">
              <img src="" alt="Question diagram" id="flashImg" loading="lazy">
            </div>
            <p id="flashQuestion" class="question-text"></p>
            <p class="flash-hint">Tap to reveal answer</p>
          </div>
          <div class="flash-card-back">
            <div id="flashBackImage" class="question-image" style="display:none;">
              <img src="" alt="Question diagram" id="flashBackImg" loading="lazy">
            </div>
            <p id="flashBackQuestion" class="flash-back-question"></p>
            <div class="flash-answer">
              <p id="flashAnswer"></p>
            </div>
          </div>
        </div>
      </div>

      <div class="flash-nav">
        <button id="flashBtnPrev" class="btn btn-outline flash-nav-btn">Previous</button>
        <button id="flashBtnNext" class="btn btn-primary flash-nav-btn">Next</button>
      </div>
      <div class="flash-counter">
        <span id="flashCounterText"></span>
      </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="resultsScreen" class="screen hidden">
      <div class="results-card">
        <h2>Session Complete</h2>
        <div class="results-score">
          <span id="resultsPercent" class="score-percent"></span>
          <span id="resultsCount" class="score-count"></span>
        </div>
        <div id="resultsBySection" class="results-sections"></div>
      </div>
      <div class="results-actions">
        <button id="btnStudyMissedResults" class="btn btn-primary hidden">Study Missed Questions</button>
        <button id="btnStudyAgain" class="btn btn-outline">Study Again (Same Sections)</button>
        <button id="btnBackHome" class="btn btn-outline">Back to Sections</button>
      </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox hidden" role="dialog" aria-label="Enlarged image">
      <img src="" alt="" id="lightboxImg">
      <button class="lightbox-close" aria-label="Close">&times;</button>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
